services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: bookstore_postgres
    environment:
      POSTGRES_USER: bookstore
      POSTGRES_PASSWORD: bookstore
      POSTGRES_DB: bookstore
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready -U bookstore' ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bookstore

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: bookstore_redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ 'CMD', 'redis-cli', 'ping' ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bookstore

  # Meilisearch
  meilisearch:
    image: getmeili/meilisearch:latest
    container_name: bookstore_meilisearch
    environment:
      MEILI_MASTER_KEY: masterKey
    ports:
      - '7700:7700'
    volumes:
      - meilisearch_data:/meili_data
    healthcheck:
      test: [ 'CMD', 'curl', '-f', 'http://localhost:7700/health' ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bookstore
